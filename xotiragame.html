<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Xotira O'yini</title>
    <style>
        body {
            background: #2c3e50; color: white; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        h2 { margin-bottom: 10px; }
        .info { margin-bottom: 20px; font-size: 18px; }
        
        /* O'yin maydoni */
        .grid {
            display: grid; grid-template-columns: repeat(4, 70px); gap: 10px;
            perspective: 1000px;
        }
        
        /* Kartochka stili */
        .card {
            width: 70px; height: 70px; position: relative; transform-style: preserve-3d;
            transition: transform 0.5s; cursor: pointer;
        }
        .card.flip { transform: rotateY(180deg); }
        
        /* Old va orqa tomon */
        .front, .back {
            width: 100%; height: 100%; position: absolute; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; backface-visibility: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .front { background: #ecf0f1; transform: rotateY(180deg); } /* Emoji tomoni */
        .back { background: #3498db; color: white; font-size: 24px; } /* Yopiq tomon */
        
        button {
            margin-top: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer;
            background: #e74c3c; color: white; border: none; border-radius: 5px;
        }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

    <h2>🧠 Xotira O'yini</h2>
    <div class="info">Harakatlar: <span id="moves">0</span></div>
    
    <div class="grid" id="game-board"></div>
    <button onclick="restartGame()">Qayta boshlash</button>

<script>
    const board = document.getElementById('game-board');
    const movesDisplay = document.getElementById('moves');
    // Juftliklar (8 ta juft = 16 ta karta)
    const emojis = ['🍕','🍕','🚀','🚀','🐱','🐱','🌵','🌵','💎','💎','🎈','🎈','🎸','🎸','🍦','🍦'];
    
    let cards = []; 
    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let moves = 0;
    let matchesFound = 0;

    function shuffle(array) {
        array.sort(() => 0.5 - Math.random());
    }

    function createBoard() {
        board.innerHTML = '';
        shuffle(emojis);
        emojis.forEach(emoji => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.name = emoji;
            
            const front = document.createElement('div');
            front.classList.add('front');
            front.textContent = emoji;
            
            const back = document.createElement('div');
            back.classList.add('back');
            back.textContent = '?';
            
            card.appendChild(front);
            card.appendChild(back);
            board.appendChild(card);
            
            card.addEventListener('click', flipCard);
        });
    }

    function flipCard() {
        if (lockBoard) return;
        if (this === firstCard) return;

        this.classList.add('flip');

        if (!hasFlippedCard) {
            // Birinchi karta
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        // Ikkinchi karta
        secondCard = this;
        incrementMoves();
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.name === secondCard.dataset.name;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        matchesFound++;
        resetBoard();
        if(matchesFound === 8) setTimeout(() => alert("Tabriklaymiz! Yutdingiz 🎉"), 500);
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    function incrementMoves() {
        moves++;
        movesDisplay.textContent = moves;
    }

    function restartGame() {
        moves = 0; matchesFound = 0;
        movesDisplay.textContent = moves;
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
        createBoard();
    }

    // O'yinni boshlash
    createBoard();
</script>

</body>
</html>
